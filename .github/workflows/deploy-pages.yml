name: 部署Dashboard到GitHub Pages

on:
  # 当dashboard目录下的文件有更新时触发部署
  push:
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-pages.yml'

  # 允许手动触发部署（用于首次部署或紧急更新）
  workflow_dispatch:

# GitHub Actions Pages模式必须的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止并发部署冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
