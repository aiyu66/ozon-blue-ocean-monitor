name: Ozon蓝海监控每日运行

on:
  # 每天06:00 UTC（北京时间14:00，莫斯科时间09:00）自动运行
  schedule:
    - cron: '0 6 * * *'

  # 允许手动触发（可选demo模式或真实爬取）
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式: demo(演示数据) 或 real(真实爬取)'
        required: false
        default: 'real'
        type: choice
        options:
          - real
          - demo

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 安装Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 安装其他依赖
        run: pip install -r requirements.txt

      - name: 创建数据目录
        run: |
          mkdir -p data/history
          mkdir -p data/analysis_history

      - name: 运行监控爬取（真实模式）
        if: ${{ github.event.inputs.mode != 'demo' }}
        run: python run.py
        env:
          CI: true
          HEADLESS: true

      - name: 运行监控爬取（Demo模式）
        if: ${{ github.event.inputs.mode == 'demo' }}
        run: python run.py --demo
        env:
          CI: true

      - name: 检查爬取结果有效性
        id: check_data
        run: |
          python -c "
          import json
          with open('data/latest.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          total_products = sum(r.get('scraped_products', 0) for r in data.get('results', []))
          print(f'total_products={total_products}')
          if total_products == 0:
              print('WARNING: 爬取数据全为0，可能被反爬拦截，自动切换Demo模式')
          "
          
      - name: 自动Fallback到Demo模式（爬取失败时）
        if: ${{ steps.check_data.outputs.total_products == '0' && github.event.inputs.mode != 'demo' }}
        run: |
          echo "爬取失败，自动切换Demo模式生成数据"
          python run.py --demo

      - name: 运行分析引擎
        run: python analyzer.py

      - name: 提取Dashboard数据到独立文件
        run: |
          cp dashboard/data.json dashboard/latest-analysis.json
          echo "Dashboard数据已更新"

      - name: 提交监控数据更新到main分支
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 自动监控数据更新 - $(date +'%Y-%m-%d %H:%M')"
          file_pattern: 'data/*.json dashboard/data.json dashboard/latest-analysis.json'

      - name: 部署Dashboard到gh-pages分支
        uses: peaceiris/actions-gh-pages@v4
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          force_orphan: true
