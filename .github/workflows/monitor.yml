name: Ozon蓝海监控每日运行

on:
  # 每天06:00 UTC（北京时间14:00，莫斯科时间09:00）自动运行
  schedule:
    - cron: '0 6 * * *'

  # 允许手动触发（用于首次测试或紧急更新）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: 安装Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 安装其他依赖
        run: pip install -r requirements.txt

      - name: 创建数据目录
        run: |
          mkdir -p data/history
          mkdir -p data/analysis_history

      - name: 运行监控爬取
        run: python run.py
        env:
          CI: true
          HEADLESS: true

      - name: 运行分析引擎
        run: python analyzer.py

      - name: 提取Dashboard数据到独立文件
        run: |
          cp dashboard/data.json dashboard/latest-analysis.json
          echo "Dashboard数据已更新"

      - name: 提交数据更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 自动监控数据更新 - $(date +'%Y-%m-%d %H:%M')"
          file_pattern: 'data/*.json dashboard/data.json dashboard/latest-analysis.json'
